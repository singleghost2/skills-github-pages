---
layout: default
---
<div class="wrapper">
  <section class="hero">
    <h1 class="hero-title">{{ page.heading | default: site.title }}</h1>
    <p class="hero-desc">{{ page.subheading | default: site.description }}</p>
  </section>

  <section class="post-list">
    {% for post in site.posts %}
      {% include post-card.html post=post %}
    {% endfor %}
    {% if site.posts.size == 0 %}
      <p class="empty">还没有文章，敬请期待。</p>
    {% endif %}
  </section>
</div>
